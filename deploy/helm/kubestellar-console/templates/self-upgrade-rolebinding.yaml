{{- if and .Values.rbac.create .Values.selfUpgrade.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubestellar-console.fullname" . }}-self-upgrade
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubestellar-console.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubestellar-console.fullname" . }}-self-upgrade
subjects:
  - kind: ServiceAccount
    name: {{ include "kubestellar-console.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
